name: Release TokenLUV

on:
  push:
    tags:
      - 'v*'        # Corre cuando pusheás un tag tipo v0.1.0, v1.0.0, etc.
  workflow_dispatch:  # O podés lanzarlo manualmente desde GitHub

permissions:
  contents: write   # Necesario para crear el Release con los archivos adjuntos

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest   # Windows real → NSIS funciona sin Wine

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build

      - name: Crear installer Windows (NSIS + Portable)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # Sin certificado de firma de código
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win nsis portable --config electron-builder.yml --publish never

      - name: Listar archivos generados
        run: dir dist-release

      - name: Subir instalador al Release de GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist-release/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
